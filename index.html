<!DOCTYPE html>
<!-- Define el tipo de documento como HTML5 -->

<html lang="es">
<!-- Indica que la página está en español -->

<head>
  <meta charset="UTF-8" />
  <!-- Permite usar caracteres como acentos y ñ -->

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Hace que la página se adapte a diferentes tamaños de pantalla (responsive) -->

  <title>FIKASPORT — Equípate para Ganar</title>
  <!-- Título que aparece en la pestaña del navegador -->

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <!-- Prepara la conexión con Google Fonts para que cargue más rápido -->

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Optimiza la conexión con el servidor de fuentes -->

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <!-- Importa fuentes personalizadas -->

  <link rel="stylesheet" href="styles.css" />
  <!-- Conecta el archivo CSS donde están los estilos -->
</head>

<body>
<!-- Aquí empieza todo lo visible en la página (lo que el usuario mira) -->

  <!-- NAVBAR: barra de navegación superior -->
  <nav class="navbar" id="navbar">
  <!-- <nav> sirve para agrupar enlaces de navegación -->

    <div class="nav-inner">
    <!-- <div> es un contenedor para organizar elementos -->

      <a href="#hero" class="logo">APEX<span>SPORT</span></a>
      <!-- <a> es un enlace, en este caso lleva al inicio -->
      <!-- <span> sirve para dar estilo a una parte del texto -->

      <ul class="nav-links">
      <!-- <ul> crea una lista no ordenada -->

        <li><a href="#productos" class="nav-link">Productos</a></li>
        <!-- <li> es un elemento de la lista -->
        <!-- Cada <a> lleva a una sección de la página -->

        <li><a href="#categorias" class="nav-link">Categorías</a></li>
        <li><a href="#servicios" class="nav-link">Servicios</a></li>
        <li><a href="#contacto" class="nav-link">Contacto</a></li>
      </ul>

      <button class="cart-btn" id="cartBtn">
      <!-- <button> crea un botón interactivo -->
